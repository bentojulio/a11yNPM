name: publish-npm

on:
  push:
    branches:
      - main   # 🔑 necessário para Trusted Publishing funcionar corretamente

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # 🔑 OIDC obrigatório

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'   # 🔴 crítico para OIDC

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish (Trusted Publishing)
        run: npm publish --access public --provenance
