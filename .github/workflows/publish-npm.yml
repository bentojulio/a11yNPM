name: publish-npm

on:
  push:
    branches:
      - main
    paths:
      - 'src/tests-metadata.ts'
      - '.changeset/**'
  workflow_dispatch: 

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  
      pull-requests: write 
      id-token: write  

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@11.11.1

      - name: Install Dependencies
        run: npm install
      
      - name: Build Package
        run: npm run build
        
      - name: Create Release PR or Versioning
        id: changesets
        uses: changesets/action@v1
        with:
          publish: echo "Versioning complete, handing over to manual publish"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to NPM (Manual OIDC)
        id: npm_publish
        if: github.ref_name == 'main' && steps.changesets.outputs.hasChangesets == 'false'
        run: |
          npm publish --access public --provenance
          echo "done=true" >> $GITHUB_OUTPUT
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub Release
        if: steps.npm_publish.outputs.done == 'true'
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          FULL_TAG="${PKG_NAME}@${VERSION}"
          
          echo "Generating release for: $FULL_TAG"
          gh release create "$FULL_TAG" \
            --title "$FULL_TAG" \
            --generate-notes \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}