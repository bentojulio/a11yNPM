name: publish-npm

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # 🔑 necessário para OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (OIDC ready)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'   # 🔴 CRÍTICO

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # DEBUG (opcional, podes remover depois)
      - name: Debug registry
        run: |
          npm config get registry
          npm whoami || echo "not logged in (expected with OIDC)"

      - name: Publish (OIDC)
        run: npm publish --access public --provenance
