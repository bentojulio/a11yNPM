name: publish-npm

on:
  push:
    branches:
      - main   # 🔑 OIDC espera push na main

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # 🔑 necessário para Trusted Publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'  # 🔴 crítico

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # 🔍 Debug (ajuda a garantir que o binding está correto)
      - name: Debug context
        run: |
          echo "REF=$GITHUB_REF"
          echo "SHA=$GITHUB_SHA"
          npm config get registry

      - name: Publish (OIDC)
        run: npm publish --access public --provenance
